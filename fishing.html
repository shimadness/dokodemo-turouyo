<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>どこでも釣ろうよ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #0c1020; color: #e8ecf8;
    user-select: none; touch-action: manipulation;
  }

  /* ---- カメラ / フォールバック背景 ---- */
  #cam {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0; display: none;
  }
  #fallback-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 90% 40% at 50% 0%, #17203a 0%, transparent 60%),
      linear-gradient(180deg, #0e1428 0%, #0a0f1e 45%, #060a14 100%);
  }
  #fallback-bg::after { /* ゆらぐ水面の光 */
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 30% 4% at 30% 62%, rgba(90,140,255,.14), transparent),
      radial-gradient(ellipse 24% 3% at 68% 74%, rgba(90,200,255,.10), transparent),
      radial-gradient(ellipse 36% 5% at 50% 86%, rgba(120,120,255,.08), transparent);
    animation: shimmer 5s ease-in-out infinite alternate;
  }
  @keyframes shimmer { from { opacity: .5; transform: translateX(-8px); } to { opacity: 1; transform: translateX(8px); } }
  #cam-note {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: #5a6488; z-index: 1; white-space: nowrap;
  }

  /* ---- 上部UI ---- */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    background: linear-gradient(180deg, rgba(6,9,18,.85), transparent);
  }
  #topbar .title { font-size: 13px; font-weight: bold; letter-spacing: 1px; margin-right: auto; }
  .place-chips { display: flex; gap: 6px; }
  .pchip {
    font-size: 11px; padding: 6px 10px; border-radius: 999px; cursor: pointer;
    background: rgba(30,38,68,.8); color: #9aa3c8; border: 1px solid #2a3358;
  }
  .pchip.on { background: #3a48d8; color: #fff; border-color: #5a6aff; }
  #zukan-btn {
    font-size: 11px; padding: 6px 12px; border-radius: 999px; cursor: pointer;
    background: rgba(30,38,68,.8); color: #ffd75e; border: 1px solid #4a4358;
  }

  /* ---- 釣りエリア ---- */
  #line-svg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
  #rod {
    position: fixed; right: -30px; bottom: -20px; width: 220px; height: 260px;
    z-index: 6; pointer-events: none; transform-origin: 85% 90%;
    transition: transform .25s;
  }
  body.casting #rod { transform: rotate(-14deg); }
  body.bite #rod { transform: rotate(6deg); animation: rodshake .12s 4; }
  @keyframes rodshake { 50% { transform: rotate(9deg) translateY(2px); } }

  #float {
    position: fixed; z-index: 6; width: 26px; height: 34px; margin: -17px 0 0 -13px;
    pointer-events: none; opacity: 0; transition: left .55s cubic-bezier(.3,-.2,.5,1), top .55s cubic-bezier(.2,-.6,.6,1);
  }
  #float.landed { animation: bob 1.8s ease-in-out infinite; }
  #float.dunk { animation: dunk .5s ease-in infinite alternate; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(4px); } }
  @keyframes dunk { from { transform: translateY(4px); } to { transform: translateY(14px); } }
  #bite-mark {
    position: fixed; z-index: 7; font-size: 34px; font-weight: bold; color: #ffd75e;
    text-shadow: 0 0 12px rgba(255,180,60,.9); margin: -70px 0 0 -10px;
    pointer-events: none; display: none; animation: pop .18s;
  }
  @keyframes pop { from { transform: scale(.3); } to { transform: scale(1); } }
  .ripple {
    position: fixed; z-index: 4; width: 12px; height: 6px; margin: -3px 0 0 -6px;
    border: 2px solid rgba(160,210,255,.7); border-radius: 50%;
    pointer-events: none; animation: rip 1s ease-out forwards;
  }
  @keyframes rip { to { transform: scale(7); opacity: 0; } }

  #hint {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 8;
    font-size: 13px; color: #cdd6f4; background: rgba(10,14,28,.72);
    padding: 9px 18px; border-radius: 999px; white-space: nowrap;
    border: 1px solid #2a3358;
  }
  #toast {
    position: fixed; top: 30%; left: 50%; transform: translate(-50%,-50%); z-index: 30;
    font-size: 16px; font-weight: bold; color: #fff; background: rgba(15,20,40,.9);
    padding: 12px 22px; border-radius: 14px; border: 1px solid #3a4368;
    display: none; animation: pop .2s; white-space: nowrap;
  }

  /* ---- ファイトUI ---- */
  #fight-ui {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    width: min(340px, 84vw); z-index: 9; display: none;
  }
  body.fighting #fight-ui { display: block; }
  body.fighting #hint { display: none; }
  .fbar { margin-bottom: 8px; }
  .fbar .flabel { font-size: 10px; color: #9aa3c8; margin-bottom: 3px; letter-spacing: 1px; }
  .ftrack { height: 14px; background: rgba(10,14,28,.8); border: 1px solid #2a3358; border-radius: 999px; overflow: hidden; }
  .ffill { height: 100%; width: 0%; border-radius: 999px; transition: width .1s linear; }
  #reel-fill { background: linear-gradient(90deg, #3dc8ff, #5a6aff); }
  #tension-fill { background: linear-gradient(90deg, #3ddb84, #ffd75e 60%, #ff4a4a); }
  #fight-hint {
    text-align: center; font-size: 12px; color: #cdd6f4; margin-top: 6px;
    background: rgba(10,14,28,.72); border-radius: 999px; padding: 6px 10px;
  }
  body.run #fight-hint { color: #ff8a8a; font-weight: bold; }

  /* 前アタリ: 小さくピクッ */
  #float.nibble { animation: nib .3s 2; }
  @keyframes nib { 50% { transform: translateY(7px); } }

  /* 振りキャストチップ */
  #motion-btn {
    font-size: 11px; padding: 6px 10px; border-radius: 999px; cursor: pointer;
    background: rgba(30,38,68,.8); color: #9aa3c8; border: 1px solid #2a3358;
  }
  #motion-btn.on { color: #7fff9d; border-color: #2a6a3e; }
  #motion-btn.hidden { display: none; }
  #mute-btn {
    font-size: 13px; padding: 5px 9px; border-radius: 999px; cursor: pointer;
    background: rgba(30,38,68,.8); border: 1px solid #2a3358;
  }

  /* 危険域: 画面のふちが赤く滲む + テンションバーが明滅 */
  #vignette {
    position: fixed; inset: 0; z-index: 3; pointer-events: none; opacity: 0;
    transition: opacity .25s;
    background: radial-gradient(ellipse at center, transparent 52%, rgba(255,40,40,.38));
  }
  body.danger #vignette { opacity: 1; animation: dangerpulse .7s ease-in-out infinite; }
  @keyframes dangerpulse { 50% { opacity: .55; } }
  body.danger .ftrack { border-color: #a03040; }

  /* ポンピング中: テンションバーが青系に変わる=抜けている合図 */
  body.pumping #tension-fill { background: linear-gradient(90deg, #3ddb84, #3dc8ff); }

  /* ---- 結果 / 図鑑 モーダル ---- */
  .modal {
    position: fixed; inset: 0; z-index: 40; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    background: rgba(4,6,14,.82); padding: 20px;
  }
  .modal.show { display: flex; }
  .card {
    width: min(320px, 86vw);
    background: linear-gradient(180deg, #1b2340 0%, #141a30 100%);
    border-radius: 18px; padding: 16px 18px 18px; text-align: center;
    border: 2px solid #2a3358; animation: pop .25s;
  }
  .card.r3 { border-color: #3d6bd8; }
  .card.r4 { border-color: #9a4ae0; box-shadow: 0 0 18px rgba(154,74,224,.3); }
  .card.r5 { border-color: #e8b04a; box-shadow: 0 0 24px rgba(232,176,74,.4); }
  .stage { background: radial-gradient(circle at 50% 42%, #232d52 0%, #10152a 78%); border-radius: 12px; margin-bottom: 10px; }
  .stage svg { display: block; width: 100%; height: auto; }
  .new-badge {
    display: inline-block; font-size: 11px; font-weight: bold; color: #0c1020;
    background: linear-gradient(90deg, #ffd75e, #ff9a3d); border-radius: 999px;
    padding: 3px 12px; margin-bottom: 6px; letter-spacing: 1px;
  }
  .stars { color: #ffd75e; font-size: 14px; letter-spacing: 2px; margin-bottom: 4px; }
  .card h2 { font-size: 19px; margin-bottom: 6px; }
  .flavor { font-size: 12px; color: #9aa3c8; line-height: 1.6; margin-bottom: 8px; }
  .statline { font-size: 11.5px; color: #7d87b0; }
  .modal .btnrow { display: flex; gap: 10px; margin-top: 16px; }
  .btn {
    padding: 11px 26px; font-size: 14px; font-weight: bold; border: none; cursor: pointer;
    border-radius: 999px; background: linear-gradient(180deg, #5a6aff, #3a48d8); color: #fff;
  }
  .btn.ghost { background: rgba(30,38,68,.9); color: #9aa3c8; border: 1px solid #2a3358; }

  /* 図鑑 */
  #zukan-modal .inner {
    width: min(680px, 94vw); max-height: 82vh; overflow-y: auto;
    background: #12172b; border: 1px solid #2a3358; border-radius: 16px; padding: 16px;
  }
  #zukan-modal h3 { font-size: 14px; color: #aab3d8; margin-bottom: 4px; }
  #zukan-modal .sub { font-size: 11px; color: #6f7ba6; margin-bottom: 12px; }
  #zukan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; }
  .zcell { background: #181f38; border-radius: 10px; padding: 6px; text-align: center; border: 1px solid #232c4e; }
  .zcell svg { width: 100%; height: auto; display: block; }
  .zcell .zname { font-size: 9.5px; color: #cdd6f4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .zcell .zcount { font-size: 9px; color: #7d87b0; }
  .zcell.unknown .zname { color: #4a5578; }
  .zcell.r5 { border-color: #8a6a2a; }
  .zcell.r4 { border-color: #5a3a80; }
</style>
</head>
<body>
  <video id="cam" autoplay playsinline muted></video>
  <div id="fallback-bg"></div>
  <div id="cam-note"></div>

  <div id="vignette"></div>
  <div id="topbar">
    <span class="title">🎣 どこでも釣ろうよ</span>
    <div class="place-chips" id="places"></div>
    <button id="mute-btn">🔊</button>
    <button id="motion-btn" class="hidden">📳 振りキャスト</button>
    <button id="zukan-btn">図鑑 <span id="zukan-count"></span></button>
  </div>

  <svg id="line-svg"></svg>
  <svg id="rod" viewBox="0 0 220 260">
    <path d="M 30 20 C 90 70 150 150 185 235" stroke="#8a5a30" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M 30 20 C 90 70 150 150 185 235" stroke="#c8925a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="172" y="216" width="18" height="40" rx="8" transform="rotate(24 181 236)" fill="#3a2818"/>
    <circle cx="160" cy="228" r="13" fill="#26304e" stroke="#4a5578" stroke-width="3"/>
    <circle cx="160" cy="228" r="4" fill="#7d87b0"/>
  </svg>
  <div id="float">
    <svg viewBox="0 0 26 34">
      <ellipse cx="13" cy="22" rx="9" ry="11" fill="#e84a5f"/>
      <ellipse cx="13" cy="26" rx="9" ry="7" fill="#f5f0e6"/>
      <rect x="11.5" y="2" width="3" height="10" rx="1.5" fill="#e8b04a"/>
      <circle cx="13" cy="3.5" r="3" fill="#ffd75e"/>
    </svg>
  </div>
  <div id="bite-mark">❗</div>
  <div id="hint">画面をタップしてキャスト</div>
  <div id="toast"></div>

  <div id="fight-ui">
    <div class="fbar">
      <div class="flabel">つりあげ</div>
      <div class="ftrack"><div class="ffill" id="reel-fill"></div></div>
    </div>
    <div class="fbar">
      <div class="flabel">糸のテンション</div>
      <div class="ftrack"><div class="ffill" id="tension-fill"></div></div>
    </div>
    <div id="fight-hint">長押しで巻け！</div>
  </div>

  <div class="modal" id="result-modal">
    <div id="result-card"></div>
    <div class="btnrow">
      <button class="btn" id="again-btn">もう一度</button>
    </div>
  </div>

  <div class="modal" id="zukan-modal">
    <div class="inner">
      <h3>今週の図鑑 — <span id="zukan-week"></span></h3>
      <div class="sub" id="zukan-sub"></div>
      <div id="zukan-grid"></div>
    </div>
    <div class="btnrow">
      <button class="btn ghost" id="zukan-close">とじる</button>
    </div>
  </div>

  <script type="module" src="src/game/main.js"></script>
</body>
</html>
